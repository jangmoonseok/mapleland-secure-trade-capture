<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플랜드 안전 거래 - v1 자동 입력</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>메이플랜드 안전 거래</h1>
            <p>검증된 아이템 등록 시스템</p>
        </header>

        <main class="main-content">
            <div class="capture-section">
                <div class="glass-panel">
                    <h2>1. 게임 창 캡처</h2>
                    <p class="instruction">
                        메이플랜드 게임 창을 선택하여 스트리밍하세요. 그 다음, PrintScreen 키를 눌러 아이템을 자동으로 캡처하고 분석합니다. 무결성을 위해 파일 업로드는 엄격히
                        차단됩니다.
                    </p>
                    <button id="startStreamBtn" class="btn primary-btn">화면 공유 시작</button>

                    <div class="video-container" id="videoContainer" style="display: none;">
                        <video id="screenVideo" autoplay muted></video>
                        <div class="capture-overlay" id="captureOverlay">
                            <span>PrintScreen을 눌러 프레임 캡처</span>
                            <button id="manualCaptureBtn" class="btn secondary-btn"
                                style="margin-left:1rem; padding: 0.5rem 1rem;">수동 캡처 (백업)</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="glass-panel">
                    <h2>2. 자동 입력 등록</h2>
                    <form id="itemForm" class="registration-form">
                        <div class="form-group">
                            <label for="itemName">아이템 이름</label>
                            <input type="text" id="itemName" readonly placeholder="캡처 대기 중...">
                        </div>
                        <div class="form-group stats-group">
                            <div class="stat-input">
                                <label for="statSTR">힘 (STR)</label>
                                <input type="number" id="statSTR" readonly placeholder="0">
                            </div>
                            <div class="stat-input">
                                <label for="statDEX">민첩 (DEX)</label>
                                <input type="number" id="statDEX" readonly placeholder="0">
                            </div>
                            <div class="stat-input">
                                <label for="statLUK">운 (LUK)</label>
                                <input type="number" id="statLUK" readonly placeholder="0">
                            </div>
                        </div>
                        <div id="statusMessage" class="status-message"></div>
                        <button type="button" class="btn submit-btn" disabled>아이템 등록 (v1 프리뷰)</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden canvas for capturing frame -->
    <canvas id="captureCanvas" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>

</html>
